<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Apollo Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
input{padding:8px;margin:5px}
.box{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:15px}
</style>
</head>
<body>

<h1>Калькулятор фонда Аполло</h1>

<div class="box">
Годовая премия: <input id="premium" type="number" value="5000"><br>
Дата старта: <input id="start" type="date"><br>

<label>
<input type="checkbox" id="extend">
Продлить ещё на 5 лет без пополнений и комиссий
</label>
</div>

<div class="box">
Итог: <span id="result">-</span>
</div>

<script>
let DATA=[];

async function load(){
 const r=await fetch("data/sp500.xlsx");
 const b=await r.arrayBuffer();
 const wb=XLSX.read(b,{type:"array"});
 const ws=wb.Sheets[wb.SheetNames[0]];
 const rows=XLSX.utils.sheet_to_json(ws,{header:1});
 DATA=rows.slice(1).filter(r=>r[0]&&r[1]).map(r=>[new Date(r[0]).toISOString().slice(0,10),Number(r[1])]);

 document.getElementById("start").value=DATA[0][0];
 calc();
}

function idx(d){
 return DATA.findIndex(x=>x[0]>=d);
}

function addY(d,y){
 let dt=new Date(d);
 dt.setFullYear(dt.getFullYear()+y);
 return dt.toISOString().slice(0,10);
}

function calc(){
 let p=Number(premium.value);
 let extend=document.getElementById("extend").checked;

 let years=extend?20:15;

 let s=idx(start.value);
 let e=idx(addY(start.value,years));

 if(s<0||e<0){result.innerText="нет данных";return;}

 let val=0;

 for(let i=s;i<=e;i++){
  if(i>s){
   val*=DATA[i][1]/DATA[i-1][1];
  }

  if(i<=idx(addY(start.value,15))){
   if(i==idx(addY(start.value,Math.floor((i-s)/252)))){
     val+=p*0.95;
   }
  }
 }

 result.innerText=Math.round(val).toLocaleString()+" $";
}

document.querySelectorAll("input").forEach(i=>i.addEventListener("input",calc));

load();
</script>

</body>
</html>
