<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор доходности (исправленная волатильность)</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body style="background:#0f172a;color:white;font-family:Arial;padding:20px">
<h2>Исправленная волатильность (месячные данные)</h2>
<div id="result">Загрузка...</div>

<script>
let DATA = [];

function excelDateToISO(d){
  if(d instanceof Date)return d.toISOString().slice(0,10);
  if(typeof d==="number"){
    const js=new Date(Math.round((d-25569)*86400*1000));
    return js.toISOString().slice(0,10);
  }
  const x=new Date(d);
  if(!isNaN(x))return x.toISOString().slice(0,10);
  return String(d).slice(0,10);
}

async function loadExcel(){
  const res = await fetch("/data/russia_strategy.xlsx");
  const buffer = await res.arrayBuffer();
  const wb = XLSX.read(buffer, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true });
  DATA = rows.slice(1).map(r=>[excelDateToISO(r[0]), Number(r[1])]);
}

function calcVol(series){
  let rets=[];
  for(let i=1;i<series.length;i++){
    rets.push(series[i]/series[i-1]-1);
  }
  const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
  const variance = rets.reduce((a,b)=>a+(b-mean)*(b-mean),0)/(rets.length-1);
  return Math.sqrt(variance)*Math.sqrt(12);
}

async function init(){
  await loadExcel();
  const series = DATA.map(r=>r[1]);
  const vol = calcVol(series);
  document.getElementById("result").innerText = "Volatility: " + (vol*100).toFixed(2)+"%";
}
init();
</script>
</body>
</html>
